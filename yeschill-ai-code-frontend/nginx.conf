#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  134.175.236.141;
        charset      utf-8;
        charset_types text/css application/javascript text/plain text/xml application/json;

        # 前端静态文件
        root         /usr/share/nginx/html;
        index        index.html;

        # 前端路由 history 模式
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API 反向代理到后端
        location /api/ {
            proxy_pass http://127.0.0.1:1113;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE 流式响应配置
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding off;
        }

        # 部署的应用静态资源
        location /dist/ {
            rewrite ^/dist(/.*)$ $1 break;
            root /opt/yeschill-ai-code/tmp/code_deploy;
            try_files $uri $uri/ =404;
            index index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
