spring:
  application:
    name: yeschill-ai-code-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:yeschill_ai_code}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ttl: 3600
      database: 0
  session:
    store-type: redis
    timeout: 2592000

server:
  port: ${SERVER_PORT:1113}
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.yeschillaicode.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# AI 配置（密钥通过环境变量注入）
langchain4j:
  open-ai:
    chat-model:
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${AI_API_KEY:}
      model-name: ${AI_MODEL_NAME:deepseek-v4-pro}
      log-requests: true
      log-responses: true
      max-tokens: 8192
      max-retries: 2
      timeout: 180s
    streaming-chat-model:
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${AI_API_KEY:}
      model-name: ${AI_MODEL_NAME:deepseek-v4-flash}
      log-requests: true
      log-responses: true
      max-tokens: 8192
      temperature: 0.7
      max-retries: 2
      timeout: 180s
    reasoning-streaming-chat-model:
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${AI_API_KEY:}
      model-name: ${AI_REASONING_MODEL:deepseek-v4-pro}
      max-tokens: 16384
      temperature: 0.1
      log-requests: true
      log-responses: true
    routing-chat-model:
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      api-key: ${AI_API_KEY:}
      model-name: ${AI_ROUTING_MODEL:deepseek-v4-flash}
      log-requests: true
      log-responses: true

# 腾讯云 COS（密钥通过环境变量注入）
cos:
  client:
    host: ${COS_HOST:}
    secretId: ${COS_SECRET_ID:}
    secretKey: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-guangzhou}
    bucket: ${COS_BUCKET:}

# Pexels 图片搜索
pexels:
  api-key: ${PEXELS_API_KEY:}

# Pixabay 图片搜索
pixabay:
  api-key: ${PIXABAY_API_KEY:}

# 阿里云 DashScope
dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  image-model: wan2.2-t2i-flash

# 部署配置
code:
  deploy-host: ${CODE_DEPLOY_HOST:http://localhost}
